name: yt-assistant
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core ML packages — installed via conda-forge for better binary compatibility
  - pytorch::pytorch=2.1
  - scipy
  - numpy
  - scikit-learn
  # Everything else via pip (these don't have great conda packages)
  - pip:
    - fastapi==0.136.1
    - uvicorn==0.47.0
    - python-dotenv==1.2.2
    - chromadb==1.5.9
    - firebase-admin==7.4.0
    - openai==2.38.0
    - sentence-transformers==5.5.1
    - SQLAlchemy==2.0.49
    - tenacity==9.1.4
    - youtube-transcript-api==1.2.4
    - pydantic==2.13.4
