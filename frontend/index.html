<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT-Assistant - Stunning RAG Chatbot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Video Ingest Panel -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-youtube text-red-500"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                    <h1>YT-Assistant</h1>
                </div>
                <p class="subtitle">Chat with any YouTube video</p>
            </div>

            <div class="ingest-section">
                <form id="ingest-form">
                    <div class="input-group">
                        <input type="url" id="youtube-url" placeholder="Paste YouTube URL..." required autocomplete="off">
                        <button type="submit" id="ingest-btn" class="btn-primary">
                            <span class="btn-text">Analyze</span>
                            <span class="loader hidden"></span>
                        </button>
                    </div>
                    <p id="ingest-status" class="status-msg hidden"></p>
                </form>
            </div>

            <div class="video-info hidden" id="video-info">
                <h3>Active Video</h3>
                <div class="video-card">
                    <div class="video-thumb-placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-video"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.87a.5.5 0 0 0-.752-.432L16 10.5"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
                    </div>
                    <div class="video-details">
                        <p class="video-id" id="display-video-id"></p>
                        <p class="video-chunks" id="display-video-chunks"></p>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <p>Powered by RAG</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <h2>Chat Session</h2>
            </header>
            
            <div class="chat-messages" id="chat-messages">
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bot"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                    </div>
                    <h3>Ready to Assist</h3>
                    <p>Ingest a video on the left to start chatting about its content.</p>
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form" class="disabled-form">
                    <div class="input-wrapper">
                        <input type="text" id="chat-input" placeholder="Ask a question..." disabled autocomplete="off">
                        <button type="submit" id="send-btn" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
