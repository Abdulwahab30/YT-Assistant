<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT-Assistant — Sign In</title>
    <meta name="description" content="Sign in to YT-Assistant to start chatting with any YouTube video using AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: auto; }
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.12), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.12), transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(244, 63, 94, 0.06), transparent 30%);
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 64px rgba(0,0,0,0.4);
            animation: fadeSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .auth-logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-logo svg { color: #ef4444; }
        .auth-tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 36px;
        }
        .auth-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }
        .auth-form input[type="email"],
        .auth-form input[type="password"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 13px 16px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }
        .auth-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .btn-full {
            width: 100%;
            padding: 13px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            border: none;
        }
        .btn-indigo {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }
        .btn-indigo:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
        .btn-indigo:active { transform: translateY(0); }
        .btn-indigo:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-google {
            background: rgba(255,255,255,0.06);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.12) !important;
        }
        .btn-google:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            color: var(--text-muted);
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .auth-toggle {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-toggle a:hover { text-decoration: underline; }
        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .auth-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: #86efac;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            display: none;
            animation: fadeIn 0.3s ease;
            text-align: center;
        }
        #register-form { display: none; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                <h1>YT-Assistant</h1>
            </div>
            <p class="auth-tagline">Sign in to start chatting with any YouTube video.</p>

            <div id="auth-error" class="auth-error"></div>
            <div id="auth-success" class="auth-success"></div>

            <!-- Login Form -->
            <div id="login-form">
                <p class="auth-section-title">Email & Password</p>
                <form class="auth-form" id="email-login-form" novalidate>
                    <input type="email" id="login-email" placeholder="Email address" autocomplete="email" required>
                    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
                    <button type="submit" id="login-btn" class="btn-full btn-indigo">
                        <span class="btn-text">Sign In</span>
                        <span class="loader hidden"></span>
                    </button>
                </form>

                <div class="divider"><span>or continue with</span></div>

                <button id="google-login-btn" class="btn-full btn-google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>

                <div class="auth-toggle">Don't have an account? <a href="#" id="show-register">Create one</a></div>
            </div>

            <!-- Register Form -->
            <div id="register-form">
                <p class="auth-section-title">Create Account</p>
                <form class="auth-form" id="email-register-form" novalidate>
                    <input type="email" id="register-email" placeholder="Email address" autocomplete="email" required>
                    <input type="password" id="register-password" placeholder="Password (min. 6 characters)" autocomplete="new-password" required>
                    <button type="submit" id="register-btn" class="btn-full btn-indigo">
                        <span class="btn-text">Create Account</span>
                        <span class="loader hidden"></span>
                    </button>
                </form>

                <div class="divider"><span>or continue with</span></div>

                <button id="google-register-btn" class="btn-full btn-google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign up with Google
                </button>

                <div class="auth-toggle">Already have an account? <a href="#" id="show-login">Sign in</a></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="login.js"></script>
</body>
</html>
